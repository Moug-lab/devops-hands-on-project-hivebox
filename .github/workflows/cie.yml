name: CI Pipeline

on:
  push:
    branches: ["main", "phase-*"]
  pull_request:
    branches: ["main"]

jobs:

  # -------------------------------
  # LINT + TEST JOB
  # -------------------------------
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pylint

      - name: Lint code
        run: |
          pylint app.py --fail-under=9.0

      - name: Run tests
        run: |
          pytest test_app.py -v


  # -------------------------------
  # BUILD + CONTAINER TEST JOB
  # -------------------------------
  build:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t moughivebox:v0.0.1 .

      - name: Run container (detached mode)
        run: |
          docker run -d --name hivebox-test -p 5000:5000 moughivebox:v0.0.1

      - name: Wait for container to be ready
        run: |
          echo "Waiting for container..."
          sleep 5

      - name: Test endpoint
        run: |
          curl -f http://localhost:5000/version

      - name: Stop container
        run: |
          docker stop hivebox-test
