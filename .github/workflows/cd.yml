name: CD Pipeline

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: mabms
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push to GHCR and Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/moug-lab/hivebox:${{ steps.meta.outputs.VERSION }}
            ghcr.io/moug-lab/hivebox:latest
            docker.io/mabms/hivebox:${{ steps.meta.outputs.VERSION }}
            docker.io/mabms/hivebox:latest

      - name: Image pushed summary
        run: |
          echo "✅ Pushed ghcr.io/moug-lab/hivebox:${{ steps.meta.outputs.VERSION }}"
          echo "✅ Pushed docker.io/mabms/hivebox:${{ steps.meta.outputs.VERSION }}"