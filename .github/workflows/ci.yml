name: CI Pipeline

on:
  push:
    branches: ["main", "phase-*"]
  pull_request:
    branches: ["main"]

jobs:

  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pylint

      - name: Lint code
        run: |
          pylint app.py --fail-under=9.0

      - name: Run tests
        run: |
          pytest test_app.py -v


  build:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t hivebox .

      - name: Run container
        run: |
          docker run -d -p 5000:5000 hivebox
          sleep 5

      - name: Test endpoint
        run: |
          curl -f http://localhost:5000/version

      - name: Stop container
        run: |
          docker ps -q | xargs -r docker stop