name: CI Pipeline

on:
  push:
    branches: ["main", "phase-*"]
  pull_request:
    branches: ["main"]

jobs:

  # -------------------------------
  # LINT + TEST JOB
  # -------------------------------
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Lint code
        run: |
          pylint app.py --fail-under=9.0

      - name: Run unit tests
        run: |
          pytest test_app.py -v

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        continue-on-error: true

  # -------------------------------
  # BUILD + INTEGRATION TEST JOB
  # -------------------------------
  build:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Docker image
        run: |
          docker build -t hivebox:test .

      - name: Run container
        run: |
          docker run -d --name hivebox-test -p 5000:5000 hivebox:test

      - name: Wait for container to be ready
        run: |
          echo "Waiting for container..."
          sleep 5

      - name: Test /version endpoint
        run: |
          curl -f http://localhost:5000/version

      - name: Test /metrics endpoint
        run: |
          curl -f http://localhost:5000/metrics

      - name: Run integration tests
        run: |
          pytest test_integration.py -v

      - name: Stop container
        run: |
          docker stop hivebox-test

  # -------------------------------
  # TERRASCAN K8S MANIFESTS JOB
  # -------------------------------
  terrascan:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Terrascan on Kubernetes manifests
        uses: tenable/terrascan-action@v1.5.0
        with:
          iac_type: k8s
          iac_dir: k8s/
          only_warn: true